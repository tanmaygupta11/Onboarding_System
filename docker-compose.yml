services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "8089:8089"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8089/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Interpolated from repo-root `.env` or your shell — NOT from `frontend/.env`.
        # Empty = same-origin `/api/...` (nginx proxy).
        # For split hosts, set only the backend origin, e.g.
        # https://awign-onboarding-system-api.awignhub.in (no trailing `/api`).
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8088:8088"
    restart: unless-stopped
